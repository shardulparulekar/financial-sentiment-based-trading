name: Daily model retrain + cleanup

on:
  schedule:
    # Runs every day at 09:00 UTC.
    # 09:00 UTC = off-peak for GitHub hosted runners → lower chance of runner
    # unavailability / job drops vs the busy 13:00 UTC slot.
    # Timing is also strategically better for prediction quality:
    #   - European markets open at ~08:00 UTC — overnight sentiment is fully
    #     captured before the open, giving a cleaner pre-market signal.
    #   - US markets open at ~14:30 UTC — signal is ready well before open.
    #   - Asian markets (JP, HK, IN) have already closed — prices available.
    # Weekdays: fresh Asian close prices + overnight news → full retrain
    # Weekends: Friday EOD prices + weekend news → sentiment-updated signal
    #           (ensures Monday's prediction captures all weekend news)
    - cron: "0 9 * * *"

  # Keeps the workflow "active" so GitHub doesn't silently drop scheduled runs.
  # Any push to main resets the inactivity clock.
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "src/**"
      - "requirements.txt"

  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers to retrain (blank = auto batch)"
        required: false
        default: ""
      batch:
        description: "Force batch A or B (blank = auto by day of week)"
        required: false
        default: ""

# Prevent multiple runs overlapping — if a new run starts, let the old one finish.
# cancel-in-progress: false is intentional: the schedule fires once per day and
# should never be cancelled by a push-triggered keepalive run.  Setting this to
# true was causing scheduled runs to be silently dropped when a push event
# coincided with the schedule window.
concurrency:
  group: daily-retrain
  cancel-in-progress: false

jobs:
  retrain:
    # Skip the retrain logic on push events — push trigger is only here
    # to keep the workflow active and prevent GitHub from disabling it.
    # The actual retrain only runs on schedule or manual dispatch.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas numpy "yfinance>=0.2.36" feedparser requests pytz \
            "transformers==4.53.2" "tokenizers==0.21.2" torch sentencepiece tf-keras \
            scikit-learn scipy supabase python-dotenv

      - name: Debug — show structure
        run: |
          echo "PWD: $(pwd)"
          ls -la
          ls fintech-sentiment/ 2>/dev/null || echo "No fintech-sentiment subfolder — running from root"

      - name: Run daily retrain
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TICKERS_OVERRIDE: ${{ github.event.inputs.tickers }}
          DAY_BATCH: ${{ github.event.inputs.batch }}
        run: |
          if [ -f "fintech-sentiment/scripts/daily_retrain.py" ]; then
            echo "Running from fintech-sentiment subfolder"
            cd fintech-sentiment
          fi
          echo "Batch: ${DAY_BATCH:-auto}"
          echo "Working dir: $(pwd)"
          python scripts/daily_retrain.py
