name: Daily model retrain + cleanup

on:
  schedule:
    # 13:00 UTC weekdays — 1 hour before US market open (09:00 ET)
    - cron: "0 13 * * 1-5"

  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers to retrain (blank = auto batch)"
        required: false
        default: ""
      batch:
        description: "Force batch A or B (blank = auto by day of week)"
        required: false
        default: ""

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 90      # Batch of ~50 tickers needs up to 75 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas numpy "yfinance>=0.2.36" feedparser requests pytz \
            "transformers==4.53.2" "tokenizers==0.21.2" torch sentencepiece tf-keras \
            scikit-learn scipy supabase python-dotenv

      - name: Debug — show structure
        run: |
          echo "PWD: $(pwd)"
          ls -la
          ls fintech-sentiment/ 2>/dev/null || echo "No fintech-sentiment subfolder — running from root"

      - name: Run daily retrain
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TICKERS_OVERRIDE: ${{ github.event.inputs.tickers }}
          DAY_BATCH: ${{ github.event.inputs.batch }}
        run: |
          if [ -f "fintech-sentiment/scripts/daily_retrain.py" ]; then
            echo "Running from fintech-sentiment subfolder"
            cd fintech-sentiment
          fi
          echo "Batch: ${DAY_BATCH:-auto}"
          echo "Working dir: $(pwd)"
          python scripts/daily_retrain.py
