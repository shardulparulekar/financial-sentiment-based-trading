name: Daily model retrain + cleanup

on:
  schedule:
    # ── Market-aware schedule ──────────────────────────────────────────────────
    # Runs at 8:00 AM ET (13:00 UTC) on weekdays — 1 hour before US market open
    # Also catches overnight news from Asian and European markets
    - cron: "0 13 * * 1-5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers to retrain (leave blank for all)"
        required: false
        default: ""

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # safety cap — free tier has 2,000 min/month

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install only what the retrain script needs — skip streamlit/plotly
          pip install \
            pandas numpy yfinance feedparser requests pytz \
            transformers==4.53.2 tokenizers==0.21.2 torch sentencepiece tf-keras \
            scikit-learn scipy supabase

      - name: Run daily retrain
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TICKERS_OVERRIDE: ${{ github.event.inputs.tickers }}
        run: python scripts/daily_retrain.py
